<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login and signup form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100vh;
            /* background-color: #005a87; */
            letter-spacing: 0.09rem;
            background-image: url("https://www.availity.com/wp-content/uploads/2024/05/content-block-bg-3.jpg");
            color: white;
        }
        
        .form {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .login {
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(100, 100, 150, 0.9);
            border-radius: 10px;
        }
        
        .login div {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            flex-direction: column;
        }
        
        .email input,
        .name input,
        .password input,
        .cnumber input {
            padding: 0.5rem 2rem;
            border: none;
            outline: none;
            border-radius: 10px;
            letter-spacing: 0.1rem;
            font-size: 15px;
            font-weight: 400;
            letter-spacing: 0.1rem;
        }
        
        .name label,
        .email label,
        .password label,
        .cnumber label {
            position: relative;
            left: 10px;
            font-size: 1.1rem;
            padding-bottom: 5px;
            padding-top: 10px;
            font-weight: 300;
            color: white;
        }
        
        #btn {
            padding: 10px 40px;
            font-size: 20px;
            font-weight: 600;
            margin-top: 20px;
            border: solid red solid;
            color: white;
            outline: none;
            overflow: hidden;
            border-radius: 10px;
            position: relative;
            background: linear-gradient(to right, yellow, orange);
            background-position: left;
            background-repeat: no-repeat;
            background-size: 0% 100%;
            cursor: pointer;
            transition: all 0.5s ease;
        }
        
        #btn:hover {
            background-size: 100% 100%;
            color: white;
            transform: scale(1.05);
        }
        
        .account {
            margin-top: 30px;
        }
        
        #signup {
            display: none;
        }
        
        .hrefsignup {
            color: aqua;
        }
    </style>
</head>

<body>
    <form action="" class="form">

        <div class="login" id="login">
            <h1>Log In</h1>
            <div class="email">
                <label for="email">Email:</label>
                <input type="email" class="email" type="email" placeholder="enter your email" required>
            </div>
            <div class="password">
                <label for="paswword">Password:</label>
                <input type="password" class="password" type="password" placeholder="enter your password" required>
            </div>

            <div class="btn">
                <button id="btn" class="btn-log-in">Log In</button>
            </div>
            <div class="account">
                <span>If you do not have an account,<br>Make an account <a href="#" class="hrefsignup" id="hrefsignup">Sign UP</a> </span>
            </div>
        </div>
        <!-- ============================= -->
        <div class="login" id="signup">
            <h1>WELCOME</h1>
            <div class="name">
                <label for="name">Name:</label>
                <input type="text" type="name" placeholder="enter your name" required>
            </div>
            <div class="cnumber">
                <label for="cnumber">Contact Number:</label>
                <input type="number" class="cnumber" placeholder="enter your contact number">
            </div>
            <div class="email">
                <label for="email">Email:</label>
                <input type="email" class="email" type="email" placeholder="enter your email" required>
            </div>
            <div class="password">
                <label for="paswword">Password:</label>
                <input type="password" class="password" type="password" placeholder="enter your password" minlength="6" maxlength="12" required>
            </div>
            <div class="password">
                <label for="password"> Conform Password:</label>
                <input type="password" class="password" type="password" placeholder="enter your password" minlength="6" maxlength="12" required>
            </div>
            <div class="btn">
                <button id="btn" class="btn-sign-up" type="submit">Sign UP</button>
            </div>
        </div>
    </form>
    <script>
        let login = document.getElementById("login");
        let signup = document.getElementById("signup");
        let hrefsignup = document.getElementById("hrefsignup");

        hrefsignup.addEventListener("click", (e) => {
            e.preventDefault();
            login.style.display = "none";
            signup.style.display = "flex";
        })

        let loginbtn1 = document.querySelector(".btn-log-in");
        let signupbtn1 = document.querySelector(".btn-sign-up");

        signupbtn1.addEventListener("click", () => {
            alert("Your account has been created successfully , please log in your account and attach with us")
        })
        loginbtn1.addEventListener("click", () => {
            alert("your account has been created successfully. Lets enjoy it.");
        })
    </script>
</body>

</html>
